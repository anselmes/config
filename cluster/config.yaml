---
apiVersion: k0s.k0sproject.io/v1beta1
kind: ClusterConfig
metadata:
  name: kubernetes
spec:
  api:
    address: 127.0.0.1
    # externalAddress: 127.0.0.1
    # onlyBindToAddress: true
    sans:
      - kubernetes.local
      - 127.0.0.1
    extraArgs:
      # audit-log-maxage: "30"
      # audit-log-maxbackup: "10"
      # audit-log-maxsize: "100"
      # audit-log-path: /var/log/kubernetes/audit.log
      # audit-policy-files: /var/lib/k0s/audit-policy.yaml
      kubelet-prefered-address-types: InternalIP,Hostname,ExternalIP
  # storage:
  #   etcd:
  #     peerAddress: 127.0.0.1
  network:
    provider: custom
    # podCIDR: 10.244.0.0/16
    # serviceCIDR: 10.96.0.0/12
    # primaryAddressFamily: IPv4
    # dualStack:
    #   enabled: true
    #   IPv6podCIDR: fd00::0/112
    #   IPv6serviceCIDR: fd01::0/108
    kubeProxy:
      disabled: true
      mode: ipvs
      # metricsBindAddress: 127.0.0.1:10249
  featureGates:
    - name: UserNamespacesSupport
      enabled: true
  extensions:
    helm:
      charts:
        - name: cilium
          chartname: oci://ghcr.io/labsonline/charts/cni
          namespace: kube-system
          order: 1
          version: 1.0.5
          values: |
            cilium:
              enabled: true
              kubeProxyReplacement: true
              # k8sServiceHost: 127.0.0.1
              k8sServicePort: 6443
              operator:
                replicas: 1
              bgpControlPlane:
                enabled: false
              l2:
                enabled: true
                # interfaces:
                #   - eth1
              pool:
                enabled: true
                # blocks:
                #   - cidr: 172.16.0.192/27
                #   - cidr: fd00:172:16:0::192/123
        - name: openebs
          chartname: oci://ghcr.io/labsonline/charts/csi
          namespace: kube-system
          order: 2
          version: 1.0.3
          values: |
            openebs:
              openebs-crds:
                volumeSnapshots:
                  enabled: true
              loki:
                enabled: false
              alloy:
                enabled: false
        # - # ceph operator
